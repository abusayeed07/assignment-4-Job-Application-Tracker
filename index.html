<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Tracker</title>
  <!-- tailwind css  -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- font Awesome  -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap");

    body {
      font-family: "Geist", sans-serif;
    }
  </style>
</head>

<body class="bg-gray-100 flex justify-center p-5">
  <div class="w-[1110px] max-w-[1110px] mx-auto bg-gray-100">

    <!-- Header -->

    <h1 class="text-4xl font-bold mb-8 text-gray-800">Job Application Tracker</h1>

    <!-- Stats Cards -->
    <section class="grid grid-cols-3 gap-5 mb-8">
      <div class="bg-white rounded-xl p-5 shadow-sm">
        <p class="text-sm text-gray-500 uppercase tracking-wider mb-1">Total</p>
        <p class="text-3xl font-bold text-gray-800" id="total-count">8</p>
      </div>
      <div class="bg-white rounded-xl p-5 shadow-sm">
        <p class="text-sm text-gray-500 uppercase tracking-wider mb-1">Interview</p>
        <p class="text-3xl font-bold text-emerald-600" id="interview-count">0</p>
      </div>
      <div class="bg-white rounded-xl p-5 shadow-sm">
        <p class="text-sm text-gray-500 uppercase tracking-wider mb-1">Rejected</p>
        <p class="text-3xl font-bold text-red-600" id="rejected-count">0</p>
      </div>
    </section>

    <!-- Available Jobs Section  -->
    <section class="flex justify-between items-center mb-4">
      <h2 class="text-2xl font-semibold text-gray-800">Available Jobs</h2>
      <span class="bg-gray-200 text-gray-700 px-4 py-1.5 rounded-full text-base font-medium" id="section-job-count">8
        jobs</span>
    </section>

    <!-- Tabs -->
    <section class="flex gap-3 mb-6">
      <button class="btn rounded-full text-neutral-500" id="tab-all">All</button>
      <button class="btn rounded-full text-neutral-500" id="tab-interview">Interview</button>
      <button class="btn rounded-full text-neutral-500" id="tab-rejected">Rejected</button>
    </section>

    
  </div>

  <script src="./script.js"></script>
</body>

</html>
